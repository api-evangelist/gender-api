aid: gender-api
name: Gender API
description: Gender-API is an AI-powered service that determines whether a first name is more likely to be used by males or
  females, with optional localization by country, IP address, or browser locale. The API returns a gender prediction with
  an accuracy score and supports multi-name lookups, email parsing, full-name splitting, and country-of-origin queries. Gender-API
  is delivered as a metered REST API with credit-based subscription plans and integrates with Zapier, Postman, Google Sheets,
  and HubSpot.
